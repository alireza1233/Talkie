name: Download, split into 1.8GB parts (exact bytes), and upload to Release

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل بزرگ (مثلاً از Release)'
        required: true
      release_tag:
        description: 'برچسب Release (خالی بذارید خودکار)'
        required: false
        default: ''
      part_prefix:
        description: 'پیشوند قطعات'
        required: false
        default: 'downloaded-part'

jobs:
  download-split-upload-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download file
        run: |
          echo "Downloading from ${{ github.event.inputs.file_url }}"
          curl -L -o original_file "${{ github.event.inputs.file_url }}"

      - name: Split into 1.8GB parts (raw bytes)
        run: |
          mkdir -p split_parts
          # 1.8 GiB = 1932735283 bytes (زیر 2 GiB حد مجاز)
          split -b 1932735283 -d -a 3 original_file "split_parts/${{ github.event.inputs.part_prefix }}."
          echo "Split completed. Parts:"
          ls -lh split_parts/

      - name: Determine release tag
        id: get_tag
        run: |
          if [ -z "${{ github.event.inputs.release_tag }}" ]; then
            TAG="release-$(date +'%Y%m%d-%H%M%S')"
          else
            TAG="${{ github.event.inputs.release_tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.get_tag.outputs.tag }}" \
            --title "Split parts of ${{ github.event.inputs.part_prefix }}" \
            --notes "Original: ${{ github.event.inputs.file_url }}" \
            --draft=false \
            --latest=true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload all parts to Release
        run: |
          parts=($(ls split_parts/${{ github.event.inputs.part_prefix }}.* | sort))
          total=${#parts[@]}
          echo "Total parts: $total"
          for part in "${parts[@]}"; do
            echo "Uploading $(basename "$part") ..."
            gh release upload "${{ steps.get_tag.outputs.tag }}" "$part" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up
        run: |
          rm -f original_file
          rm -rf split_parts
