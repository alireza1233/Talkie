name: Download, split into 1.8GB parts, and upload to Release

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل بزرگ (مثلاً از Release)'
        required: true
      release_tag:
        description: 'برچسب Release (مثلاً v1.0.0) - خالی بذارید خودکار میشه'
        required: false
        default: ''
      part_prefix:
        description: 'پیشوند نام قطعات (بدون پسوند، مثلاً myfile)'
        required: false
        default: 'downloaded-part'

jobs:
  download-split-upload-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # برای ایجاد Release و آپلود asset
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download file
        run: |
          echo "Downloading from ${{ github.event.inputs.file_url }}"
          curl -L -o original_file "${{ github.event.inputs.file_url }}"

      - name: Split into 1.8GB parts
        run: |
          mkdir -p split_parts
          # هر قطعه 1.8 گیگابایت (حدود 1843 مگابایت - دقیقاً 1.8 * 1024 = 1843.2)
          split -b 1.8G -d -a 3 original_file "split_parts/${{ github.event.inputs.part_prefix }}."
          echo "Split completed. Parts:"
          ls -lh split_parts/

      - name: Determine release tag
        id: get_tag
        run: |
          if [ -z "${{ github.event.inputs.release_tag }}" ]; then
            TAG="release-$(date +'%Y%m%d-%H%M%S')"
          else
            TAG="${{ github.event.inputs.release_tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using release tag: $TAG"

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.get_tag.outputs.tag }}" \
            --title "Split parts of ${{ github.event.inputs.part_prefix }}" \
            --notes "Auto-generated from workflow. Original file: ${{ github.event.inputs.file_url }}" \
            --draft=false \
            --latest=true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload all parts to Release
        run: |
          parts=($(ls split_parts/${{ github.event.inputs.part_prefix }}.* | sort))
          total=${#parts[@]}
          echo "Total parts to upload: $total"
          
          for part in "${parts[@]}"; do
            filename=$(basename "$part")
            echo "Uploading $filename ..."
            gh release upload "${{ steps.get_tag.outputs.tag }}" "$part" --clobber
          done
          echo "All parts uploaded successfully."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up
        run: |
          rm -f original_file
          rm -rf split_parts
          echo "Temporary files removed."
